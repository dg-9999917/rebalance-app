const GDRIVE_CLIENT_ID   = '848368395563-kp5f6h7mceh25hsnuree1ljarbf5f90e.apps.googleusercontent.com';
const GDRIVE_SCOPES      = 'https://www.googleapis.com/auth/drive.file';
const GDRIVE_FOLDER_NAME = '리밸런싱앱_백업';

let gdriveTokenClient = null;
let gdriveAccessToken = null;
let gdriveUserEmail   = null;
let gdriveAutoBackup  = true;
let lastDriveFileList = []; // 미리보기 모달 "뒤로" 클릭 시 재요청 없이 목록 복원용

function initGoogleDrive() {
  let attempts = 0;
  const maxAttempts = 20;

  function tryInit() {
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      gdriveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID,
        scope: GDRIVE_SCOPES,
        callback: onGdriveTokenResponse,
      });
      const saved = localStorage.getItem('gdrive_auto_backup');
      gdriveAutoBackup = saved !== null ? saved === 'true' : true;
      gdriveUserEmail = localStorage.getItem('gdrive_user_email') || null;
      updateGdriveUI();
      return;
    }
    attempts++;
    if (attempts < maxAttempts) {
      setTimeout(tryInit, 500);
    } else {
      gdriveUserEmail = localStorage.getItem('gdrive_user_email') || null;
      updateGdriveUI();
    }
  }

  tryInit();
}

function connectGoogleDrive() {
  if (!gdriveTokenClient) {
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      gdriveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GDRIVE_CLIENT_ID,
        scope: GDRIVE_SCOPES,
        callback: onGdriveTokenResponse,
      });
    } else {
      alert('구글 로그인 서비스를 불러오는 중입니다.\n잠시 후 다시 시도해 주세요.');
      return;
    }
  }
  gdriveTokenClient.requestAccessToken();
}

async function onGdriveTokenResponse(tokenResponse) {
  if (tokenResponse.error) {
    console.error('Google OAuth error:', tokenResponse.error);
    alert('구글 로그인에 실패했습니다: ' + (tokenResponse.error_description || tokenResponse.error));
    return;
  }
  gdriveAccessToken = tokenResponse.access_token;
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
      headers: { Authorization: `Bearer ${gdriveAccessToken}` }
    });
    const info = await res.json();
    gdriveUserEmail = info.email || '연결됨';
    localStorage.setItem('gdrive_user_email', gdriveUserEmail);
  } catch (e) {
    gdriveUserEmail = '연결됨';
  }
  updateGdriveUI();
}

function disconnectGoogleDrive() {
  if (gdriveAccessToken && typeof google !== 'undefined') {
    google.accounts.oauth2.revoke(gdriveAccessToken, () => {});
  }
  gdriveAccessToken = null;
  gdriveUserEmail = null;
  localStorage.removeItem('gdrive_user_email');
  updateGdriveUI();
}

async function ensureGdriveToken() {
  if (!gdriveAccessToken) return false;
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=' + gdriveAccessToken);
    if (res.ok) return true;
  } catch (e) {}
  return new Promise(resolve => {
    gdriveTokenClient.callback = (resp) => {
      if (resp.error) { gdriveAccessToken = null; resolve(false); return; }
      gdriveAccessToken = resp.access_token;
      gdriveTokenClient.callback = onGdriveTokenResponse;
      resolve(true);
    };
    gdriveTokenClient.requestAccessToken({ prompt: '' });
  });
}

async function getOrCreateDriveFolder() {
  const token = gdriveAccessToken;
  const q = encodeURIComponent(`name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const searchData = await searchRes.json();
  if (searchData.files && searchData.files.length > 0) return searchData.files[0].id;
  const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const created = await createRes.json();
  return created.id;
}

// 저장 대상: v3 appData 전체 (rebalance_app_v3)
async function saveToDrive() {
  const valid = await ensureGdriveToken();
  if (!valid) return false;
  try {
    const folderId = await getOrCreateDriveFolder();
    const token = gdriveAccessToken;

    const now = new Date();
    const ts = now.getFullYear()
      + '-' + String(now.getMonth() + 1).padStart(2, '0')
      + '-' + String(now.getDate()).padStart(2, '0')
      + '_' + String(now.getHours()).padStart(2, '0')
      + '-' + String(now.getMinutes()).padStart(2, '0')
      + '-' + String(now.getSeconds()).padStart(2, '0');
    const fileName = `backup_${ts}.json`;

    const backupData = JSON.stringify(appData, null, 2);
    const metadata = { name: fileName, mimeType: 'application/json', parents: [folderId] };
    const boundary = '---rebalance_backup_boundary';
    const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${backupData}\r\n--${boundary}--`;

    const uploadRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
      body
    });
    if (uploadRes.ok) {
      localStorage.setItem('gdrive_last_backup', now.toLocaleString('ko-KR'));
      updateGdriveUI();
      return true;
    }
    return false;
  } catch (e) {
    console.error('드라이브 저장 오류:', e);
    return false;
  }
}

async function loadFromDrive() {
  const valid = await ensureGdriveToken();
  if (!valid) { alert('구글 드라이브에 연결되어 있지 않습니다.\n먼저 연결해 주세요.'); return; }
  try {
    const folderId = await getOrCreateDriveFolder();
    const token = gdriveAccessToken;

    const q = encodeURIComponent(`'${folderId}' in parents and mimeType='application/json' and trashed=false`);
    const searchRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=createdTime desc&pageSize=30&fields=files(id,name,modifiedTime,size)`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    const searchData = await searchRes.json();

    if (!searchData.files || !searchData.files.length) {
      alert('드라이브에 백업 파일이 없습니다.');
      return;
    }

    lastDriveFileList = searchData.files;
    showDriveFileList(searchData.files);
  } catch (e) {
    console.error('드라이브 불러오기 오류:', e);
    alert('드라이브에서 파일 목록을 가져오는 중 오류가 발생했습니다.\n' + e.message);
  }
}

  const existing = document.getElementById('gdrive-file-modal');
  if (existing) existing.remove();

  let listHtml = '';
  files.forEach((f, i) => {
    const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('ko-KR') : '알 수 없음';
    const sizeKB = f.size ? (parseInt(f.size) / 1024).toFixed(1) + ' KB' : '';
    const badge = i === 0 ? ' <span style="color:var(--positive);font-size:11px;font-weight:700">최신</span>' : '';
    listHtml += `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer"
           onclick="previewDriveFile('${f.id}', '${esc(f.name)}')"
           onmouseover="this.style.background='var(--surface2)'"
           onmouseout="this.style.background='transparent'">
        <div>
          <div style="font-size:13px;font-weight:600">${esc(f.name)}${badge}</div>
          <div style="font-size:11px;color:var(--text-sub)">${date}${sizeKB ? ' · ' + sizeKB : ''}</div>
        </div>
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();previewDriveFile('${f.id}', '${esc(f.name)}')">미리보기</button>
      </div>`;
  });

  const modal = document.createElement('div');
  modal.id = 'gdrive-file-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:flex;align-items:center;justify-content:center;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };

  modal.innerHTML = `
    <div style="background:var(--surface);border-radius:12px;width:90%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
        <div style="font-size:16px;font-weight:700">☁️ 드라이브 백업 목록</div>
        <button style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text)" onclick="document.getElementById('gdrive-file-modal').remove()">✕</button>
      </div>
      <div style="overflow-y:auto;flex:1">${listHtml}</div>
      <div style="padding:12px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text-sub)">
        총 ${files.length}개 백업 · 클릭하여 미리보기
      </div>
    </div>`;

  document.body.appendChild(modal);
}

// 파일 클릭 시 즉시 복원하지 않고 내용을 내려받아 미리보기 (신규)
async function previewDriveFile(fileId, fileName) {
  let loaded = null;
  try {
    const token = gdriveAccessToken;
    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const fileText = await fileRes.text();
    const parsed = JSON.parse(fileText);
    if (parsed && Array.isArray(parsed.accounts) && parsed.accounts.length) loaded = parsed;
  } catch (e) {
    console.error('드라이브 미리보기 오류:', e);
    loaded = null;
  }
  showDrivePreviewModal(fileId, fileName, loaded);
}

function showDrivePreviewModal(fileId, fileName, loaded) {
  const existing = document.getElementById('gdrive-preview-modal');
  if (existing) existing.remove();
  const existingList = document.getElementById('gdrive-file-modal');
  if (existingList) existingList.remove();

  // 저장 시각은 파일명 기준(backup_YYYY-MM-DD_HH-MM-SS.json), 형식이 다르면 파일명 그대로 표시
  const m = fileName.match(/backup_(\d{4}-\d{2}-\d{2})_(\d{2})-(\d{2})-(\d{2})/);
  const savedAt = m ? `${m[1]} ${m[2]}:${m[3]}:${m[4]}` : fileName;

  let bodyHtml;
  let canRestore = false;
  if (!loaded) {
    bodyHtml = `<div style="padding:16px 0;color:var(--negative);font-size:13px">⚠️ 읽을 수 없는 백업 파일입니다.</div>`;
  } else {
    canRestore = true;
    const accList = loaded.accounts.map(a => {
      const stockCount = ((a.state && a.state.stocks) || []).filter(s => s.market !== 'CASH').length;
      return `<li>${esc(a.name)} (종목 ${stockCount}개)</li>`;
    }).join('');
    const cons = loaded.consolidated || [];
    const consList = cons.map(c => `<li>📁 ${esc(c.name)} (멤버: ${(c.memberIds || []).length}개)</li>`).join('');
    bodyHtml = `
      <div style="font-size:13px;line-height:1.8">
        <div style="color:var(--text-sub);margin-bottom:8px">저장 시각: ${esc(savedAt)}</div>
        <div style="font-weight:700;margin-bottom:4px">포함된 계좌</div>
        <ul style="margin:0 0 10px 18px;padding:0">${accList || '<li style="color:var(--text-sub)">없음</li>'}</ul>
        ${cons.length ? `<div style="font-weight:700;margin-bottom:4px">종합계좌</div><ul style="margin:0;padding:0 0 0 18px">${consList}</ul>` : ''}
      </div>`;
  }

  const modal = document.createElement('div');
  modal.id = 'gdrive-preview-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:650;display:flex;align-items:center;justify-content:center;';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div style="background:var(--surface);border-radius:12px;width:90%;max-width:440px;max-height:80vh;overflow-y:auto;padding:20px">
      <div style="font-size:16px;font-weight:700;margin-bottom:8px;word-break:break-all">${esc(fileName)}</div>
      ${bodyHtml}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-sm" onclick="document.getElementById('gdrive-preview-modal').remove();showDriveFileList(lastDriveFileList)">뒤로</button>
        <button class="btn btn-sm btn-primary" ${canRestore ? '' : 'disabled'} onclick="document.getElementById('gdrive-preview-modal').remove();restoreFromDrive('${fileId}', '${esc(fileName)}')">이 백업으로 복원</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

// 예전(v2) 백업일 수도 있으므로 1단계 마이그레이션과 동일한 정리(이력·스냅샷 필드 제거)를 통과시킴
function sanitizeLoadedAppData(loaded) {
  return {
    activeAccountId: loaded.activeAccountId,
    accounts: (loaded.accounts || []).map(migrateAccountFromV2),
    consolidated: (loaded.consolidated || []).map(c => ({ id: c.id, name: c.name, memberIds: c.memberIds || [] })),
    activeConsolidatedId: loaded.activeConsolidatedId || null,
    // 전략 콘솔 데이터(토큰은 별도 키라 여기 안 들어있음) — 백업에 포함, 형식만 방어적으로 정리
    strategies: (loaded.strategies || []).map(s => ({
      id: s.id, name: s.name, coupledAccountId: s.coupledAccountId || null,
      lastDeployedVersion: s.lastDeployedVersion || null,
      lastDeployedStocks: Array.isArray(s.lastDeployedStocks) ? s.lastDeployedStocks : [],
      lastDeployedMemo: s.lastDeployedMemo || '', // 수정 10차 — 콘솔 테이블 메모 열 표시용
    })),
  };
}

async function restoreFromDrive(fileId, fileName) {
  if (!confirm(`"${fileName}" 백업을 복원합니다.\n\n현재 모든 데이터가 이 백업으로 교체됩니다.\n이 작업은 되돌릴 수 없습니다. 계속하시겠습니까?`)) return;
  try {
    const token = gdriveAccessToken;
    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const fileText = await fileRes.text();
    const loaded = JSON.parse(fileText);

    if (!loaded.accounts || !Array.isArray(loaded.accounts) || !loaded.accounts.length) {
      alert('백업 파일 형식이 올바르지 않습니다.');
      return;
    }

    appData = sanitizeLoadedAppData(loaded);
    const validId = appData.accounts.find(a => a.id === appData.activeAccountId)
      ? appData.activeAccountId : appData.accounts[0].id;
    activateAccount(validId);
    saveState();
    renderAll();
    renderSettingsTab();

    const modal = document.getElementById('gdrive-file-modal');
    if (modal) modal.remove();

    alert(`백업 복원 완료! (${loaded.accounts.length}개 계좌)\n파일: ${fileName}`);
  } catch (e) {
    console.error('드라이브 복원 오류:', e);
    alert('복원 중 오류가 발생했습니다.\n' + e.message);
  }
}

async function manualDriveBackup(e) {
  const btn = (e && e.target) || document.activeElement;
  if (btn) { btn.disabled = true; btn.textContent = '백업 중...'; }
  const ok = await saveToDrive();
  if (btn) { btn.disabled = false; btn.textContent = '지금 백업하기'; }
  if (ok) alert('구글 드라이브에 백업 완료!');
  else alert('백업에 실패했습니다. 연결 상태를 확인해 주세요.');
}

function buildGdriveUI() {
  const isConnected = !!gdriveAccessToken;
  const email = gdriveUserEmail || '';

//  설정 탭 — ⑤ 고급 (접이식, 기본 접힘) — 전략별 비중 배포 관리자 콘솔
// ═══════════════════════════════════════════════════════════════════

let advancedOpen = false;

// 수정 9차 — weights.json에는 있으나 로컬 strategies에는 없는 "유령 프로필" 감지 캐시.
// null=아직 조회 안 함, []=조회했지만 없음(또는 토큰 없음/실패), [...]=조회된 유령 목록.
// 네트워크 GET이 필요해 고급 섹션을 펼칠 때만(그리고 목록이 바뀌는 동작 뒤에) 비동기로 채운다.
let ghostProfilesCache = null;
let ghostProfilesLoading = false;

function toggleAdvanced() {
  advancedOpen = !advancedOpen;
  if (advancedOpen && ghostProfilesCache === null && !ghostProfilesLoading) loadGhostProfiles();
  renderSettingsTab();
}

async function loadGhostProfiles() {
  if (!getGhToken()) { ghostProfilesCache = []; return; }
  ghostProfilesLoading = true;
  try {
    const { profiles } = await fetchRemoteProfiles();
    const localIds = new Set((appData.strategies || []).map(s => s.id));
    ghostProfilesCache = profiles.filter(p => !localIds.has(p.id));
    reconcileStrategiesWithRemote(profiles); // 같은 조회 결과로 로컬 배포 기록도 자가 보정(수정 10차)
  } catch (e) {
    ghostProfilesCache = []; // 조회 실패는 조용히 무시(고급 섹션의 나머지 렌더링을 막지 않음)
  } finally {
    ghostProfilesLoading = false;
    renderSettingsTab();
  }
}

// 수정 10차 — 로드 시 자가 보정: weights.json의 실제 버전이 로컬 콘솔 기록과 다르면 파일 기준으로
// 갱신(상태 배지도 자연히 재판정됨 — strategyStatus()가 매번 lastDeployedStocks 기준으로 새로 계산).
// 과거 nextStrategyVersion() 버그처럼 어떤 이유로든 로컬이 파일보다 뒤처졌던 경우를 스스로 복구
function reconcileStrategiesWithRemote(remoteProfiles) {
  let changed = false;
  (appData.strategies || []).forEach(s => {
    const remote = remoteProfiles.find(p => p.id === s.id);
    if (!remote) return;
    if (remote.version !== s.lastDeployedVersion) {
      s.lastDeployedVersion = remote.version;
      s.lastDeployedStocks = Array.isArray(remote.stocks) ? remote.stocks.map(x => ({ ...x })) : [];
      s.lastDeployedMemo = remote.memo || '';
      changed = true;
    } else if ((s.lastDeployedMemo || '') !== (remote.memo || '')) {
      s.lastDeployedMemo = remote.memo || '';
      changed = true;
    }
  });
  if (changed) saveState();
  return changed;
}

// weights.json이 실제로 바뀌었을 수 있는 동작(토큰 변경·배포·삭제·유령 제거) 뒤에 호출 —
// 캐시를 비우고 고급 섹션이 열려 있으면 즉시 재조회
function invalidateGhostProfilesCache() {
  ghostProfilesCache = null;
  if (advancedOpen) loadGhostProfiles();
}

function removeGhostProfile(profileId) {
  const p = (ghostProfilesCache || []).find(x => x.id === profileId);
  if (!p) return;
  if (!getGhToken()) { alert('먼저 GitHub 토큰을 저장해 주세요.'); return; }
  if (!confirm(`"${p.name}" 프로필을 GitHub weights.json에서 완전히 제거하시겠습니까?\n이 전략을 따르던 가족에게는 "추천이 종료되었습니다" 안내가 뜹니다.`)) return;
  removeGhostProfileConfirmed(profileId, p.name);
}

async function removeGhostProfileConfirmed(profileId, name) {

// ── GitHub 토큰 (appData와 분리된 별도 localStorage 키 — 드라이브 백업(appData)·weights.json 어디에도 포함되지 않음) ──
const GH_TOKEN_KEY = 'rebalance_v3_gh_token';
const GH_OWNER = 'dg-9999917';
const GH_REPO = 'rebalance-app';
const GH_BRANCH = 'main'; // git으로 확인한 기본 브랜치명

function getGhToken() { return localStorage.getItem(GH_TOKEN_KEY) || ''; }

function saveGhToken() {

// UTF-8 안전 base64 디코드(GitHub Contents API의 content는 60자마다 개행 포함)
function b64DecodeUtf8(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function b64EncodeUtf8(str) {
  return btoa(String.fromCharCode(...new TextEncoder().encode(str)));
}

// weights.json GET → {profiles, sha}. 구형식/파싱실패/파일없음은 profiles:[]로 취급
// (기존 단일 배포 이력은 새 전략 시스템의 출발점이 아니므로 그대로 버림 — 설계문서 5절)
async function fetchRemoteProfiles() {
  const token = getGhToken();
  const apiBase = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/weights.json`;
  const res = await fetch(`${apiBase}?ref=${GH_BRANCH}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
  });
  if (res.status === 401 || res.status === 403) throw new Error('토큰이 유효하지 않습니다 — 설정에서 토큰을 확인하세요');
  if (res.status === 404) return { profiles: [], sha: null };
  if (!res.ok) throw new Error(`오류 (상태 코드 ${res.status})`);
  const json = await res.json();
  let parsed = null;
  try { parsed = JSON.parse(b64DecodeUtf8(json.content)); } catch (e) { parsed = null; }
  const profiles = parsed && Array.isArray(parsed.profiles) ? parsed.profiles : [];
  return { profiles, sha: json.sha };
}

async function putRemoteProfiles(profiles, sha, message) {
  const token = getGhToken();
  const apiBase = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/weights.json`;
  const jsonStr = JSON.stringify({ profiles }, null, 2);
  const body = { message, content: b64EncodeUtf8(jsonStr), branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(apiBase, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (res.status === 401 || res.status === 403) throw new Error('토큰이 유효하지 않습니다 — 설정에서 토큰을 확인하세요');
  if (res.status === 409) { const err = new Error('다른 배포와 겹쳤습니다'); err.status = 409; throw err; }
  if (!res.ok) throw new Error(`배포 실패 (상태 코드 ${res.status})`);
  return res.json();
}

// weights.json에 대한 GET(최신 내용+sha)→mergeFn으로 병합→PUT을 한 번에 수행.
// 409(다른 배포와 충돌) 시 0.5~1초 대기 후 "내용까지 새로 GET"부터 다시 시작 — 낡은 내용으로
// 재시도해 다른 전략을 덮어쓰는 일이 없도록 매 시도마다 mergeFn을 최신 profiles에 다시 적용한다.
// 최대 2회 재시도(총 3회 시도) 후에도 충돌하면 사용자에게 안내 메시지로 실패를 알린다.
async function deployProfilesWithRetry(mergeFn, message, maxRetries = 2) {
  for (let attempt = 0; ; attempt++) {
    const { profiles, sha } = await fetchRemoteProfiles();
    const nextProfiles = mergeFn(profiles);
    try {
      return await putRemoteProfiles(nextProfiles, sha, message);
    } catch (e) {
      if (e.status === 409 && attempt < maxRetries) {
        await new Promise(r => setTimeout(r, 500 + Math.random() * 500));
        continue;
      }
      if (e.status === 409) throw new Error('다른 배포와 겹쳤습니다 — 잠시 후 다시 시도해 주세요');
      throw e;
    }
  }
}

// 수정 9차 — 이 계좌가 어떤 전략의 커플링 계좌로 지정돼 있는지(💍 표시용)
function isAccountCoupled(accountId) {
  return (appData.strategies || []).some(s => s.coupledAccountId === accountId);
}

function getCoupledAccountStocks(strategy) {
  const acc = appData.accounts.find(a => a.id === strategy.coupledAccountId);
  if (!acc) return null;
  return acc.state.stocks.map(s => ({ name: s.name, ticker: s.ticker, market: s.market, r: s.adjR }));
}

// 변경 감지는 표시용일 뿐 어떤 자동 동작도 하지 않음(설계문서 3절) — lastDeployedStocks vs 현재 커플링 계좌 비교
function strategyStatus(strategy) {
  const acc = appData.accounts.find(a => a.id === strategy.coupledAccountId);
  if (!acc) return '⚠️ 계좌 재지정 필요';
  if (!strategy.lastDeployedVersion) return '미배포';
  const current = getCoupledAccountStocks(strategy) || [];
  const diff = diffStockLists(strategy.lastDeployedStocks || [], current);
  const changed = diff.added.length || diff.changed.length || diff.excluded.length;
  return changed ? '🔶 미배포 변경 있음' : '✅ 최신';
}

function deleteStrategyLocalOnly(id) {
  appData.strategies = (appData.strategies || []).filter(s => s.id !== id);
  saveState();
  // 콘솔에서만 지운 전략은 GitHub weights.json에 그대로 남아 "파일에만 존재" 상태가 되므로 재확인
  invalidateGhostProfilesCache();
  const overlay = document.getElementById('strategy-delete-overlay');
  if (overlay) overlay.remove();
  renderSettingsTab();
  renderAccountDropdown();
}

async function deleteStrategyFromGithub(id) {
  const s = (appData.strategies || []).find(x => x.id === id);
  if (!s) return;
  if (!getGhToken()) { alert('먼저 GitHub 토큰을 저장해 주세요.'); return; }
  const resultEl = document.getElementById('strategy-delete-result');
  const showResult = (msg, isErr) => { if (resultEl) { resultEl.textContent = msg; resultEl.style.display = 'block'; resultEl.style.color = isErr ? 'var(--negative)' : 'var(--positive)'; } };
  showResult('GitHub에서 제거하는 중...', false);
  try {
    await deployProfilesWithRetry(profiles => profiles.filter(p => p.id !== id), `전략 제거: ${s.name}`);
    appData.strategies = (appData.strategies || []).filter(x => x.id !== id);
    saveState();
    // 수정 12차 — confirmStrategyDeploy()와 같은 이유로 제거: 방금 우리가 지운 전략은 이미 로컬
    // strategies에서도 빠졌으니 유령이 될 수 없고, 다른 전략들의 lastDeployedVersion도 이 PUT과
    // 무관해 재조회가 필요 없음(PUT 직후 즉시 GET하면 아직 반영 전 내용을 읽어와 되돌릴 위험만 있음)
    const overlay = document.getElementById('strategy-delete-overlay');
    if (overlay) overlay.remove();
    renderSettingsTab();
    renderAccountDropdown();
  } catch (e) {
    showResult(e.message || '실패', true);
  }
}

// 수정 10차 버그 수정 — 기존 코드는 lastDeployedVersion이 정확히 "date-1"일 때만 "date-2"로
// 한 단계 전진했고, 그 외(예: 이미 "date-2")에는 곧장 "date-1"로 되돌아갔다(while 조건이 n=1에서
// 이미 거짓이라 한 번도 안 돌고 즉시 리턴됨) — 같은 날 3번째 배포부터 버전이 "-1"로 역행하며
// 실제로 weights.json에도 "-1"이 다시 기록되던 원인. 현재 접미번호를 파싱해 +1 하도록 수정
function nextStrategyVersion(strategy, datePart) {
  const current = strategy.lastDeployedVersion || '';
  let n = 1;
  if (current.startsWith(datePart + '-')) {
    const suffix = parseInt(current.slice(datePart.length + 1), 10);
    if (!isNaN(suffix)) n = suffix + 1;
  }
  return `${datePart}-${n}`;
}

// 배포 모달의 메모 입력값을 반영해 이번에 GitHub에 쓸 프로필 payload 생성
// ([배포용 JSON 복사]와 [배포 확정]이 공유 — 기존 buildDeployPayload 분리 패턴 그대로)
function buildStrategyDeployPayload(strategyId) {
  const s = (appData.strategies || []).find(x => x.id === strategyId);
  if (!s) return null;
  const acc = appData.accounts.find(a => a.id === s.coupledAccountId);
  if (!acc) return null;
  const memoEl = document.getElementById('strategy-deploy-memo');
  const memo = memoEl ? memoEl.value.trim() : '';
  const today = new Date();
  const datePart = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  return {
    id: s.id, name: s.name,
    version: nextStrategyVersion(s, datePart),
    date: datePart, memo,
    stocks: acc.state.stocks.map(st => ({ name: st.name, ticker: st.ticker, market: st.market, r: st.adjR })),
  };
}

function openStrategyDeployModal(strategyId) {
  const s = (appData.strategies || []).find(x => x.id === strategyId);
  if (!s) return;
  const acc = appData.accounts.find(a => a.id === s.coupledAccountId);
  if (!acc) { alert('커플링 계좌가 삭제되었습니다 — 먼저 [편집]에서 계좌를 재지정하세요.'); return; }
  if (!getGhToken()) { alert('먼저 GitHub 토큰을 저장해 주세요.'); return; }

  const existing = document.getElementById('strategy-deploy-overlay');
  if (existing) existing.remove();

  const currentStocks = getCoupledAccountStocks(s) || [];
  const diff = diffStockLists(s.lastDeployedStocks || [], currentStocks);
  let diffHtml = '';
  if (diff.added.length) diffHtml += `<div class="reco-diff-block"><div class="reco-diff-title">새로 추가</div>${diff.added.map(x => esc(x.name)).join(', ')}</div>`;
  if (diff.changed.length) diffHtml += `<div class="reco-diff-block"><div class="reco-diff-title">비중 변경</div>${diff.changed.map(c => `${esc(c.name)} ${fmtDec(c.from, 1)} → ${fmtDec(c.to, 1)}`).join('<br>')}</div>`;
  if (diff.excluded.length) diffHtml += `<div class="reco-diff-block"><div class="reco-diff-title">제외 (계좌에서 삭제됨)</div>${diff.excluded.map(x => esc(x.name)).join(', ')}</div>`;
  if (!diff.added.length && !diff.changed.length && !diff.excluded.length) {
    diffHtml += `<div class="reco-diff-block">${s.lastDeployedVersion ? '마지막 배포 대비 변경 사항이 없습니다.' : '최초 배포입니다.'}</div>`;
  }

  const overlay = document.createElement('div');
  overlay.id = 'strategy-deploy-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:650;display:flex;align-items:center;justify-content:center;';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:12px;width:90%;max-width:460px;padding:20px;max-height:80vh;overflow-y:auto">
      <div style="font-size:16px;font-weight:700;margin-bottom:12px">🚀 "${esc(s.name)}" 배포</div>
      <div style="margin-bottom:12px">
        <div class="meta-label" style="margin-bottom:4px">메모</div>
        <input class="inp" id="strategy-deploy-memo" placeholder="예: 반도체 확대" style="width:100%">
      </div>
      <div style="font-size:13px;line-height:1.8;color:var(--text)">${diffHtml}</div>
      <div id="strategy-deploy-result" style="font-size:12px;margin-top:10px;display:none"></div>
      <div style="display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="copyStrategyDeployJson('${esc(strategyId)}')">JSON 복사 (예비 수단)</button>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" onclick="document.getElementById('strategy-deploy-overlay').remove()">취소</button>
          <button class="btn btn-primary btn-sm" id="strategy-deploy-confirm-btn" onclick="confirmStrategyDeploy('${esc(strategyId)}')">확정</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function copyStrategyDeployJson(strategyId) {
  const payload = buildStrategyDeployPayload(strategyId);
  if (!payload) return;
  const json = JSON.stringify(payload, null, 2);
  const resultEl = document.getElementById('strategy-deploy-result');
  const showResult = msg => { if (resultEl) { resultEl.textContent = msg; resultEl.style.display = 'block'; resultEl.style.color = 'var(--text-sub)'; } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json)
      .then(() => showResult('복사되었습니다. GitHub의 weights.json profiles 배열에 붙여넣으면 배포됩니다.'))
      .catch(() => { console.log(json); showResult('클립보드 복사 실패 — 콘솔에 출력했습니다.'); });
  } else {
    console.log(json);
    showResult('클립보드 API를 사용할 수 없어 콘솔에 출력했습니다.');
  }
}

// [배포] 확정 — 이 순간에만 실제로 GitHub weights.json이 바뀐다(설계문서 핵심 원칙)
async function confirmStrategyDeploy(strategyId) {
  const s = (appData.strategies || []).find(x => x.id === strategyId);
  if (!s) return;
  const acc = appData.accounts.find(a => a.id === s.coupledAccountId);
  if (!acc) return;
  const payload = buildStrategyDeployPayload(strategyId);
  if (!payload) return;
  const btn = document.getElementById('strategy-deploy-confirm-btn');
  const resultEl = document.getElementById('strategy-deploy-result');
  const showResult = (msg, isErr) => { if (resultEl) { resultEl.textContent = msg; resultEl.style.display = 'block'; resultEl.style.color = isErr ? 'var(--negative)' : 'var(--positive)'; } };
  if (btn) { btn.disabled = true; btn.textContent = '배포 중...'; }

  try {
    // GET(항상 최신 sha·내용)→이 프로필만 교체/추가→PUT, 409면 자동 재시도(다른 배포는 그대로 보존)
    await deployProfilesWithRetry(profiles => {
      const idx = profiles.findIndex(p => p.id === s.id);
      if (idx >= 0) profiles[idx] = payload; else profiles.push(payload);
      return profiles;
    }, `배포: ${s.name} ${payload.version}`);

    s.lastDeployedVersion = payload.version;
    s.lastDeployedStocks = payload.stocks.map(x => ({ ...x }));
    s.lastDeployedMemo = payload.memo || '';
    // 배포 원본 계좌는 이미 이 버전을 그대로 반영한 상태이므로 자기 자신에게 배너가 뜨지 않도록 동기화
    acc.state.meta.selectedStrategyId = s.id;
    acc.state.meta.selectedStrategyName = s.name;
    acc.state.meta.appliedRecoVersion = payload.version;
    saveState();
    // 수정 12차 버그 수정 — 여기서 invalidateGhostProfilesCache()를 부르면(고급 섹션이 열려있는
    // 상태라 항상 그럼) 곧바로 배경에서 loadGhostProfiles()가 weights.json을 다시 GET해
    // reconcileStrategiesWithRemote()를 돌리는데, PUT 직후의 GET이 아직 반영 전(구버전) 내용을
    // 받아오면 방금 정확히 세팅한 s.lastDeployedVersion/lastDeployedStocks를 도로 구버전으로
    // 덮어써버림 — 배지가 ✅로 잠깐 바뀌었다가 다시 🔶로 되돌아가고, 다음 배포도 같은 버전
    // 번호를 재사용하던 원인이었음(실측: weights.json 커밍 이력에 같은 버전 라벨이 서로 다른
    // 내용으로 두 번씩 찍혀있었음). 방금 우리가 직접 배포한 내 전략은 유령일 수 없으므로(항상
    // 로컬 strategies에 존재) 유령 목록은 이 배포로 전혀 바뀌지 않음 — 캐시 무효화·재조회 모두 불필요해
    // 호출 자체를 제거(기존 ghostProfilesCache는 그대로 유효하므로 건드리지 않음)

    showResult('배포 완료 — 반영까지 1~2분 걸릴 수 있습니다', false);
    renderSettingsTab();
    if (appData.activeAccountId === acc.id && !appData.activeConsolidatedId) evaluateRecoBanner();
    setTimeout(() => { const el = document.getElementById('strategy-deploy-overlay'); if (el) el.remove(); }, 1500);
  } catch (e) {
    showResult(e.message || '배포 실패', true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '확정'; }
  }
}

function buildAdvancedSection() {

  const strategies = appData.strategies || [];
  const rows = strategies.map(s => {
    const acc = appData.accounts.find(a => a.id === s.coupledAccountId);
    const accLabel = acc ? esc(acc.name) : '<span style="color:var(--negative)">⚠️ 재지정 필요</span>';
    return `<tr style="border-bottom:1px solid var(--border)">

      <td style="padding:10px 10px">${accLabel}</td>
      <td style="padding:10px 10px">${esc(s.lastDeployedVersion || '미배포')}</td>

  // 수정 9차 — weights.json에는 있으나 로컬 strategies엔 없는 "유령" 프로필을 회색 행으로 별도 표시
  const ghostRows = (ghostProfilesCache || []).map(p => `<tr style="border-bottom:1px solid var(--border);color:var(--text-sub)">

  const ghostStatus = ghostProfilesLoading
    ? `<div style="font-size:12px;color:var(--text-sub);margin-top:6px">파일에만 남은 전략 확인 중...</div>`

        ? `<div style="font-size:12px;color:var(--text-sub);margin-top:6px">GitHub 토큰을 저장하면 파일에만 남은 전략을 확인합니다.</div>`
        : '');

  const accOptions = appData.accounts.map(a => `<option value="${esc(a.id)}">${esc(a.name)}</option>`).join('');

  return `<div class="settings-card">
    <div class="settings-card-title" style="cursor:pointer;user-select:none" onclick="toggleAdvanced()">${advancedOpen ? '▾' : '▸'} 고급</div>
    ${advancedOpen ? `
    <div>
      <div class="settings-card-subtitle">전략별 비중 배포</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;font-size:15px;width:100%">
          <thead><tr style="border-bottom:1px solid var(--border);text-align:left;color:var(--text-sub)">

      <div class="settings-add-row" style="flex-direction:column;align-items:flex-start;gap:10px;margin-top:14px">

      <div style="border-top:1px solid var(--border);margin-top:16px;padding-top:14px">

          </div>
        </div>
      </div>
    </div>` : ''}

function buildResetSection() {
  return `<div class="settings-card"><div class="settings-card-title">⑥ 초기화</div>

      <button class="btn btn-danger" onclick="resetCurrentAccountV3()">현재 계좌 초기화</button>
      <button class="btn btn-danger" onclick="resetAllV3()">전체 초기화</button>
    </div>
  </div>`;
}

function resetCurrentAccountV3() {
  const accName = appData.accounts.find(a => a.id === appData.activeAccountId)?.name || '현재 계좌';
  if (!confirm(`"${accName}"의 종목·보유수량·원금을 모두 비웁니다.\n되돌릴 수 없습니다. 계속하시겠습니까?`)) return;
  state.meta.p0 = 0; state.meta.fx0 = 0; state.meta.fxN = 0;
  delete state.meta.appliedRecoVersion;
  delete state.meta.selectedStrategyId;
  delete state.meta.selectedStrategyName;
  state.stocks = [];
  saveState();
  renderAll();
  renderSettingsTab();
}

// rebalance_app_v2(기존 앱 키)는 절대 건드리지 않음 — v3 키만 삭제
function resetAllV3() {
  if (!confirm('모든 계좌가 삭제됩니다. 정말 전체 초기화하시겠습니까?')) return;
  if (!confirm('마지막 확인입니다 — rebalance_app_v3 데이터가 전부 삭제되고 새로고침됩니다.\n계속하시겠습니까?')) return;
  localStorage.removeItem(V3_STORAGE_KEY);
  location.reload();
}

function renderSettingsTab() {
  const container = document.getElementById('settings-content');
  if (!container) return;
  // 좌우 열을 각각의 컨테이너로 분리(디자인 4차) — 배분은 기존 그대로:
  // 좌 = ①계좌관리·③드라이브·⑤고급 / 우 = ②종합계좌·④추천비중·⑥초기화
  container.innerHTML =
    `<div class="settings-col">` +
      buildAccountsSection() +
      buildDriveSection() +
      buildAdvancedSection() +
    `</div>` +
    `<div class="settings-col">` +
      buildConsolidatedSectionV3() +
      buildRecoSection() +
      buildResetSection() +
    `</div>`;
}

function buildConsolidatedSectionV3() {
  const cons = appData.consolidated || [];
  const memberCheckboxes = appData.accounts.map(a =>
    `<label style="font-size:16px;display:flex;align-items:center;gap:8px">
      <input type="checkbox" value="${esc(a.id)}" style="width:18px;height:18px"> ${esc(a.name)}
    </label>`
  ).join('');

  let html = `<div class="settings-card"><div class="settings-card-title">② 종합계좌</div>`;
  cons.forEach(c => {
    const memberNames = c.memberIds.map(id => appData.accounts.find(a => a.id === id)?.name || '(삭제됨)').join(', ');
    const isActive = appData.activeConsolidatedId === c.id;
    html += `<div class="settings-list-row${isActive ? ' active-row' : ''}">
      <div class="settings-list-info">
        <span class="settings-list-name">📁 ${esc(c.name)}${isActive ? '<span class="settings-badge-active">현재</span>' : ''}</span>
        <span class="settings-list-sub">${esc(memberNames)}</span>
      </div>
      <div class="settings-list-actions">
        ${!isActive
          ? `<button class="btn btn-sm" onclick="activateConsolidatedV3('${c.id}')">전환</button>`
          : `<button class="btn btn-sm" onclick="deactivateConsolidatedV3()">해제</button>`}
        <button class="btn btn-sm" onclick="editConsolidatedV3('${c.id}')">편집</button>
        <button class="btn btn-sm btn-danger" onclick="deleteConsolidatedV3('${c.id}')">삭제</button>
      </div>
    </div>`;
  });

  html += `<div class="settings-add-row" style="flex-direction:column;align-items:flex-start;gap:10px">
    <input class="inp" id="new-cons-name-v3" placeholder="예: 전체 종합" style="max-width:220px">
    <div id="cons-member-checkboxes-v3" style="display:flex;flex-direction:column;gap:9px">${memberCheckboxes}</div>
    <button class="btn btn-primary btn-sm" onclick="addConsolidatedV3()">📁 종합계좌 만들기</button>
  </div>
  </div>`;
  return html;
}

// ── 종목 행 클릭 선택 토글(수정 9차, index_v2.html 방식 그대로) — 표시용일 뿐 계산·저장과 무관,
// 단일 선택(다른 행 클릭 시 이전 선택 해제, 같은 행 재클릭 시 해제). 입력칸·버튼·드래그핸들
// 클릭은 선택 토글에서 제외해 기존 조작과 충돌하지 않게 함
function handleTableRowClick(e) {
  const tr = e.target.closest('#tbl-wrap tbody tr');
  if (!tr) return;
  if (tr.classList.contains('group-hdr') || tr.classList.contains('subtotal-row')) return;
  if (e.target.closest('input, button, select, .drag-handle')) return;
  const wasSelected = tr.classList.contains('row-selected');
  document.querySelectorAll('#tbl-wrap .row-selected').forEach(el => el.classList.remove('row-selected'));
  if (!wasSelected) tr.classList.add('row-selected');
}
document.addEventListener('click', handleTableRowClick);

// ── 추천 확인 시점 확장(수정 10차): 화면 복귀 시 + 30분 주기 자동 확인 ──
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkRecoWeightsThrottled();
});
setInterval(checkRecoWeightsThrottled, 30 * 60 * 1000);
</script>
